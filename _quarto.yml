#            - pages/Pseudonymization.qmd
        - section: "Kubernetes"
          contents:
            - pages/Kubernetes_introduction.qmd
#        - section: "Scrap pages"
#          contents:
#            - roadblocks.qmd
#            - to_investigate.qmd
      
format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    mermaid:
      theme: default
    include-in-header:
      - file: CookieConsent.html


